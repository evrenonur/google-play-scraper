name: 🐛 Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Briefly describe the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the bug
      placeholder: |
        1. I ran this code...
        2. I sent these parameters...
        3. I got this error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: scraper
    attributes:
      label: Scraper Method
      description: Which scraper method is affected?
      options:
        - app
        - search
        - list
        - developer
        - suggest
        - reviews
        - similar
        - permissions
        - dataSafety
        - categories
        - Other
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Feature Area
      options:
        - Scraping / Parsing
        - Proxy
        - Throttling
        - Pagination
        - HTTP Client
        - Other

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Log / Stack Trace
      description: Paste the error message or stack trace if available
      render: shell

  - type: textarea
    id: code
    attributes:
      label: Code Example
      description: Share the code that triggers the bug (remember to mask sensitive info!)
      render: php
